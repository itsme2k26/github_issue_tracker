<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>

<section class="flex items-center justify-center bg-gray-100 min-h-screen">
    <div class="w-[400px] bg-white rounded-xl shadow-lg p-8">

        <div class="text-center mb-6">
            <img src="assets/github-logo.png" class="mx-auto mb-3 w-12">
            <h2 class="text-xl font-semibold">GitHub Issues Tracker</h2>
            <p class="text-gray-500 text-sm">Sign in to manage your issues</p>
        </div>

        <input id="username" placeholder="Username"
            class="w-full border px-3 py-2 rounded mb-3">

        <input id="password" type="password" placeholder="Password"
            class="w-full border px-3 py-2 rounded mb-4">

        <button onclick="login()"
            class="w-full bg-indigo-600 text-white py-2 rounded">
            Sign In
        </button>

        <div class="mt-4 text-center text-sm text-gray-500">
            Username: <b>admin</b> <br>
            Password: <b>admin123</b>
        </div>

    </div>
</section>

<script src="JS/index.js"></script>
</body>
</html>

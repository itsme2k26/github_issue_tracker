<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issues</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100">

    <!-- NAVBAR -->
    <nav class="bg-white px-6 py-4 flex justify-between">
        <div class="flex items-center gap-3">
            <img src="assets/github-logo.png" class="w-6">
            <h1 class="font-semibold">GitHub Issues Tracker</h1>
        </div>

        <div class="flex gap-2">
            <input id="searchInput" class="border px-2 py-1 rounded" placeholder="Search">
            <button onclick="searchIssues()" class="bg-indigo-600 text-white px-3 rounded">Search</button>
        </div>
    </nav>

    <!-- TABS -->
    <div class="p-6 flex gap-3 max-w-[1500px] mx-auto" >
        <button class="tab bg-indigo-600 text-white px-4 py-1 rounded" onclick="filterTab('all', event)">All</button>
        <button class="tab bg-gray-200 px-4 py-1 rounded" onclick="filterTab('open', event)">Open</button>
        <button class="tab bg-gray-200 px-4 py-1 rounded" onclick="filterTab('closed', event)">Closed</button>
    </div>

    <!-- COUNT -->
    <div class="px-6 flex justify-between items-center max-w-[1500px] mx-auto">
        <h2 id="issueCount">0 Issues</h2>

        <div class="flex gap-4 text-sm">
            <span class="flex items-center gap-1"><span class="w-2 h-2 bg-green-500 rounded-full"></span>Open</span>
            <span class="flex items-center gap-1"><span class="w-2 h-2 bg-purple-500 rounded-full"></span>Closed</span>
        </div>
    </div>

    <!-- SPINNER -->
    <div id="spinner" class="hidden text-center mt-6 mx-auto">
        <span class="loading loading-spinner text-indigo-600"></span>
    </div>

    <!-- CARDS -->
    <div id="issuesContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 p-6 max-w-[1500px] mx-auto">
    </div>

    <!-- MODAL -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-40 hidden items-center justify-center">

        <div class="bg-white p-6 rounded w-80">

            <h2 id="modalTitle" class="font-semibold mb-2"></h2>
            <p id="modalDesc" class="text-sm mb-2"></p>
            <p id="modalAuthor"></p>
            <p id="modalPriority"></p>
            <p id="modalLabel"></p>
            <p id="modalDate"></p>

            <button onclick="closeModal()" class="mt-4 bg-indigo-600 text-white px-3 py-1 rounded">
                Close
            </button>

        </div>

    </div>

    <script src="JS/index.js"></script>
    <script>loadIssues()</script>

</body>

</html>
